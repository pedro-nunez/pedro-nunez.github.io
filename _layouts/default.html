<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.extra_head == "leaflet" %}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">
  {% endif %}
  <script>
    // Applies a stored light/dark choice (if any) before the page paints,
    // so returning visitors never see a flash of the wrong theme. Must
    // stay inline (not moved to theme-toggle.js) to run this early.
    (function () {
      var stored = localStorage.getItem("theme");
      if (stored === "light" || stored === "dark") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    })();
  </script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/nav-toggle.js' | relative_url }}" defer></script>
</head>
<body>
  {% include header.html %}
  {% if page.extra_head == "leaflet" %}
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  {% endif %}
  {{ content }}
</body>
</html>
