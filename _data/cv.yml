  # rendercv PublicationEntry: title and authors are required (authors is
  # a flat list of name strings — rendercv doesn't support per-author
  # links, so the URLs the site used to show for co-authors are dropped
  # for the PDF). authors is the full published byline, in the actual
  # published order (including "Pedro Núñez" himself — math papers are
  # often alphabetical by surname, so his position varies per paper and
  # can't be assumed). The website excludes his own name when rendering
  # "with X and Y" (see _includes/author-list.html); the PDF export
  # italicizes it among any co-authors. journal and doi are omitted for
  # entries still under submission. arxiv is a non-standard extra field,
  # used by the site's own templates. Newest first.
  publications:
