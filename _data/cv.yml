# CV content, structured to match rendercv's YAML schema (see
# https://docs.rendercv.com/user_guide/yaml_input_structure/cv/) so it
# can be fed to rendercv (via scripts/export_cv_pdf.py) to produce
# assets/pdfs/cv.pdf, as well as backing the website's CV/Research/
# Teaching pages and the travel map. rendercv ignores extra keys it
# doesn't know about, so we keep our own fields (lat/lon for the
# travel map, status) alongside the standard ones — except non-string
# ones (numbers, booleans), which crash rendercv's template step; the
# export script strips those before handing this file to rendercv.
#
# After editing this file, regenerate assets/pdfs/cv.pdf by running
# `python scripts/export_cv_pdf.py` (see that file's module docstring
# for one-time setup) and commit the updated PDF alongside your edit —
# nothing regenerates it automatically.
#
# name/location/email/website/social_networks below mirror rendercv's
# own top-level cv fields; the website doesn't currently use them (see
# index.md for the bio), but rendercv's PDF export does. social_networks
# entries use rendercv's own recognized network names (e.g. "GitHub") —
# see https://docs.rendercv.com/user_guide/yaml_input_structure/cv/.
name: "Pedro Núñez"
location: "Taipei, Taiwan"
email: "pnunez@ntu.edu.tw"
website: "https://homepage.ntu.edu.tw/~pnunez"
social_networks:
  - network: "GitHub"
    username: "pedro-nunez"

sections:
  # rendercv EducationEntry: institution and area are required; degree,
  # location, start_date/end_date, summary, highlights are optional.
  # Newest first. lat/lon place markers on the travel map (see
